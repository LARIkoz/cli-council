# Copy to council.toml (or let `doctor enroll` write it). With NO config file,
# the council is native-only: just Claude. council.toml is git-ignored.

[council]
# Enrolled voices — only add ones whose `doctor smoke <voice>` PASSED.
voices = ["claude", "codex", "grok"]

# Who writes the final synthesised answer (defaults to claude if enrolled).
chairman = "claude"

# Per-call timeout in seconds. LEAVE THIS OUT to use the per-voice defaults
# (fast natives ~300s; slow reasoning voices like codex/grok 600s, since the
# peer-ranking prompt carries every other answer). Setting it here forces one
# ceiling on EVERY voice — an escape hatch, not the normal case.
# timeout = 600

# Optional: override a provider's command or ceiling if your CLI lives somewhere
# unusual, a vendor changed a flag, or one voice is slow on your machine.
# [providers.grok]
# bin = "grok"
# argv = ["grok", "--prompt-file", "{prompt_file}", "--output-format", "json"]
# timeout = 900
