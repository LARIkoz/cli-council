# Copy to council.toml (or let `doctor enroll` write it). With NO config file,
# the council is native-only: just Claude. council.toml is git-ignored.

[council]
# Enrolled voices — only add ones whose `doctor smoke <voice>` PASSED.
voices = ["claude", "codex", "grok"]

# Who writes the final synthesised answer (defaults to claude if enrolled).
chairman = "claude"

# Per-call timeout in seconds. LEAVE THIS OUT to use the per-voice defaults
# (fast natives ~300s; slow reasoning voices like codex/grok 600s, since the
# peer-ranking prompt carries every other answer). Setting it here forces one
# ceiling on EVERY voice — an escape hatch, not the normal case.
# timeout = 600

# Optional: override a provider's command or ceiling if your CLI lives somewhere
# unusual, a vendor changed a flag, or one voice is slow on your machine.
# [providers.grok]
# bin = "grok"
# argv = ["grok", "--prompt-file", "{prompt_file}", "--output-format", "json"]
# timeout = 900

# ── Optional: define an EXTRA CLI voice from scratch (type = "cli") ───────────
# A NEW name with type="cli" defines a fresh subscription-CLI voice — most useful
# for running two models of ONE CLI as separate voices (the built-in table has a
# single `claude`). argv is the exact command AS AN ARRAY (a bare string is
# rejected at load — it would explode into per-character args). Then list the
# names in [council] voices above.
#
# `family` (optional) groups voices by vendor lineage for the `council decide`
# family quorum — a decision must draw on ≥3 model families, and two voices of one
# house (opus + sonnet) must count ONCE. Set it on any voice you define; the
# built-ins already carry theirs (claude=anthropic, codex=openai, grok=xai,
# gemini/agy=google).
#
# [providers.opus]
# type = "cli"
# bin  = "claude"
# argv = ["claude", "-p", "--model", "opus"]
# native = true
# family = "anthropic"
#
# [providers.sonnet]
# type = "cli"
# bin  = "claude"
# argv = ["claude", "-p", "--model", "sonnet"]
# native = true
# family = "anthropic"

# ── Optional: review verification panels ────────────────────────────────────
# `council review` runs the Karpathy council (reviews → anonymous peer-ranking →
# chairman synthesis), then these PANELS verify the synthesis: every listed voice
# audits/attacks it INDEPENDENTLY and in parallel (nobody sees anybody else), and
# the verdict aggregates worst-wins — a rule, not a chairman, so no model can
# soften the gate. Any INVALID → INVALID; redteam WEAK/REFUTED → degraded.
# Empty/absent = bare council review (status "unverified").
# [review]
# audit   = ["claude", "codex", "grok"]   # panel: synthesis vs raw reviews
# redteam = ["codex", "grok"]             # panel: adversarial attack on findings

# ── Optional: decide verification panels ────────────────────────────────────
# `council decide` runs the same council (recommendations → peer-ranking → chairman),
# then verifies. AUDIT is the mandatory guard for a decision — it checks the
# synthesis is faithful to the raw voices (no invented convergence, misattribution,
# or action-tier inflation). REDTEAM is OFF by default (leave it empty): a
# recommendation has no ground-truth claim to refute. A decide run also requires ≥3
# model families to answer (the family quorum) before it will synthesize.
# [decide]
# audit   = ["claude", "codex", "grok"]   # panel: synthesis vs raw recommendations
# redteam = []                            # off by default; add voices to pressure-test

# ── Optional: token voices (opt-in) ──────────────────────────────────────────
# The default council is subscription-CLI only and needs no keys. If you'd rather
# add a voice via its API, declare it with `type = "http"`. cli-council POSTs to
# an OpenAI-compatible /chat/completions endpoint and reads the API key from the
# environment variable you name in `key_env` — the KEY IS NEVER WRITTEN HERE and
# never logged. Then list the voice in [council] voices above.
#
# Verify it before enrolling:  doctor smoke deepseek   (PASS = key set + endpoint answers)
#
# [providers.deepseek]
# type     = "http"
# endpoint = "https://api.deepseek.com/v1/chat/completions"
# model    = "deepseek-chat"
# key_env  = "DEEPSEEK_API_KEY"     # export DEEPSEEK_API_KEY=... in your shell
# family   = "deepseek"
# timeout  = 120
#
# [providers.mistral]
# type     = "http"
# endpoint = "https://api.mistral.ai/v1/chat/completions"
# model    = "mistral-large-latest"
# key_env  = "MISTRAL_API_KEY"
# family   = "mistral"
#
# [providers.qwen]                  # DashScope's OpenAI-compatible mode
# type     = "http"
# endpoint = "https://dashscope-intl.aliyuncs.com/compatible-mode/v1/chat/completions"
# model    = "qwen-max"
# key_env  = "DASHSCOPE_API_KEY"
# family   = "alibaba"
