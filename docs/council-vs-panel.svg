<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="548" viewBox="0 0 1000 548" font-family="-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <style>
      .h1  { fill:#e6edf3; font-weight:600; font-size:21px; }
      .sub { fill:#8b949e; font-size:13px; }
      .ch  { fill:#e6edf3; font-weight:600; font-size:16px; }
      .lab { fill:#e6edf3; font-size:13.5px; }
      .mut { fill:#8b949e; font-size:12.5px; }
      .mono{ font-family:'SF Mono','Menlo','Consolas',monospace; }
    </style>
  </defs>

  <rect x="0" y="0" width="1000" height="548" fill="#0d1117"/>

  <!-- title -->
  <text x="28" y="46" class="h1">Two primitives, one engine</text>
  <text x="28" y="70" class="sub">the same voices, aggregated differently — because the goal differs</text>

  <!-- ============ LEFT · COUNCIL ============ -->
  <rect x="28" y="96" width="452" height="368" rx="12" fill="#161b22" stroke="#2f6feb"/>
  <text x="52" y="130" class="ch" fill="#79c0ff">COUNCIL</text>
  <text x="456" y="130" text-anchor="end" class="mut">for answers &amp; reviews — synthesis</text>

  <rect x="52" y="150" width="404" height="40" rx="8" fill="#12233f" stroke="#2f6feb"/>
  <text x="254" y="175" text-anchor="middle" fill="#cae0ff" font-size="13.5">N voices answer — parallel, independent</text>

  <path d="M254 194 v12" stroke="#6e7681" stroke-width="1.6"/>
  <path d="M249 200 l5 6 l5 -6" fill="none" stroke="#6e7681" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="52" y="210" width="404" height="40" rx="8" fill="#12233f" stroke="#2f6feb"/>
  <text x="254" y="235" text-anchor="middle" fill="#cae0ff" font-size="13.5">anonymous peer-rank &#8594; Borda leaderboard</text>

  <path d="M254 254 v12" stroke="#6e7681" stroke-width="1.6"/>
  <path d="M249 260 l5 6 l5 -6" fill="none" stroke="#6e7681" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="52" y="270" width="404" height="40" rx="8" fill="#241a3a" stroke="#8957e5"/>
  <text x="254" y="295" text-anchor="middle" fill="#d2b8ff" font-size="13.5" font-weight="600">one chairman synthesizes</text>

  <path d="M254 314 v12" stroke="#6e7681" stroke-width="1.6"/>
  <path d="M249 320 l5 6 l5 -6" fill="none" stroke="#6e7681" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="52" y="330" width="404" height="44" rx="8" fill="#0f2e1b" stroke="#238636"/>
  <text x="254" y="357" text-anchor="middle" fill="#56d364" font-size="14" font-weight="600">nuanced prose — the answer, the review</text>

  <text x="52" y="408" class="mut">a synthesis needs judgement and one author&#8217;s hand;</text>
  <text x="52" y="426" class="mut">rankings <tspan fill="#adbac7">weight</tspan> the chairman — they never filter a voice.</text>
  <text x="52" y="448" class="mut mono" font-size="11.5">used for:  council "question"  &#183;  council review</text>

  <!-- ============ RIGHT · PANEL ============ -->
  <rect x="520" y="96" width="452" height="368" rx="12" fill="#161b22" stroke="#e3b341"/>
  <text x="544" y="130" class="ch" fill="#e3b341">PANEL</text>
  <text x="948" y="130" text-anchor="end" class="mut">for gates — verification</text>

  <rect x="544" y="150" width="404" height="40" rx="8" fill="#2b2111" stroke="#e3b341"/>
  <text x="746" y="175" text-anchor="middle" fill="#f0d38b" font-size="13.5">same prompt &#8594; every voice — blind to each other</text>

  <path d="M746 194 v12" stroke="#6e7681" stroke-width="1.6"/>
  <path d="M741 200 l5 6 l5 -6" fill="none" stroke="#6e7681" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="544" y="210" width="404" height="40" rx="8" fill="#21262d" stroke="#30363d"/>
  <text x="746" y="235" text-anchor="middle" class="mono" fill="#e6edf3" font-size="13">per-voice verdicts:  <tspan fill="#56d364">CLEAN</tspan> &#183; <tspan fill="#56d364">CLEAN</tspan> &#183; <tspan fill="#f85149" font-weight="700">INVALID</tspan></text>

  <path d="M746 254 v12" stroke="#6e7681" stroke-width="1.6"/>
  <path d="M741 260 l5 6 l5 -6" fill="none" stroke="#6e7681" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="544" y="270" width="404" height="40" rx="8" fill="#2b2111" stroke="#e3b341"/>
  <text x="746" y="295" text-anchor="middle" fill="#f0d38b" font-size="13.5" font-weight="600">worst-wins rule — no chairman, no vote-away</text>

  <path d="M746 314 v12" stroke="#6e7681" stroke-width="1.6"/>
  <path d="M741 320 l5 6 l5 -6" fill="none" stroke="#6e7681" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="544" y="330" width="404" height="44" rx="8" fill="#2d1215" stroke="#f85149"/>
  <text x="746" y="357" text-anchor="middle" fill="#f85149" font-size="14" font-weight="600">gate verdict — INVALID &#8594; pipeline DEGRADED</text>

  <text x="544" y="408" class="mut">one credible catch <tspan fill="#adbac7">vetoes</tspan> — it cannot be outvoted,</text>
  <text x="544" y="426" class="mut">out-ranked, or synthesized away. Fail-closed.</text>
  <text x="544" y="448" class="mut mono" font-size="11.5">used for:  audit panel  &#183;  redteam panel</text>

  <!-- ============ bottom strip ============ -->
  <line x1="28" y1="488" x2="972" y2="488" stroke="#30363d" stroke-width="1"/>
  <text x="500" y="516" text-anchor="middle" fill="#8b949e" font-size="13.5">
    <tspan fill="#adbac7">a synthesis needs one author</tspan><tspan fill="#484f58">    ·    </tspan><tspan fill="#adbac7">a verdict needs a rule</tspan><tspan fill="#484f58">    ·    </tspan><tspan fill="#adbac7">an LLM can be talked into softening — a rule cannot</tspan>
  </text>
</svg>
