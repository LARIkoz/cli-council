<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" font-family="-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <radialGradient id="glowB" cx="18%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#1f6feb" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#1f6feb" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowP" cx="88%" cy="90%" r="55%">
      <stop offset="0%" stop-color="#8957e5" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#8957e5" stop-opacity="0"/>
    </radialGradient>
    <style>.mono{font-family:'SF Mono','Menlo','Consolas',monospace;}</style>
  </defs>

  <rect width="1280" height="640" fill="#0d1117"/>
  <rect width="1280" height="640" fill="url(#glowB)"/>
  <rect width="1280" height="640" fill="url(#glowP)"/>

  <!-- ================= LEFT — brand ================= -->
  <text x="80" y="128" fill="#58a6ff" font-size="19" font-weight="600" letter-spacing="2.5">INSPIRED BY KARPATHY&#8217;S LLM-COUNCIL</text>

  <text x="78" y="228" fill="#e6edf3" font-size="88" font-weight="800" letter-spacing="-1">cli-council</text>

  <text x="80" y="304" fill="#e6edf3" font-size="37" font-weight="600">A council of the AI CLIs</text>
  <text x="80" y="352" fill="#e6edf3" font-size="37" font-weight="600">you <tspan fill="#3fb950">already pay for</tspan>.</text>

  <text x="80" y="418" fill="#8b949e" font-size="22">Claude · Codex · Grok · Gemini answer, anonymously rank</text>
  <text x="80" y="450" fill="#8b949e" font-size="22">each other, and a chairman writes the final answer.</text>

  <!-- pills -->
  <g font-size="20" font-weight="600">
    <rect x="80" y="502" width="176" height="48" rx="24" fill="#0f2417" stroke="#238636"/>
    <text x="168" y="533" text-anchor="middle" fill="#56d364">No API keys</text>
    <rect x="272" y="502" width="168" height="48" rx="24" fill="#161b22" stroke="#30363d"/>
    <text x="356" y="533" text-anchor="middle" fill="#adbac7">Zero deps</text>
    <rect x="456" y="502" width="230" height="48" rx="24" fill="#161b22" stroke="#30363d"/>
    <text x="571" y="533" text-anchor="middle" fill="#adbac7">Your subscriptions</text>
  </g>

  <!-- ================= RIGHT — council motif ================= -->
  <!-- voice chips -->
  <g font-size="20" font-weight="600" text-anchor="middle">
    <rect x="742" y="120" width="118" height="46" rx="10" fill="#161b22" stroke="#30363d"/><text x="801" y="149" fill="#e6edf3">claude</text>
    <rect x="874" y="120" width="118" height="46" rx="10" fill="#161b22" stroke="#30363d"/><text x="933" y="149" fill="#e6edf3">codex</text>
    <rect x="1006" y="120" width="118" height="46" rx="10" fill="#161b22" stroke="#30363d"/><text x="1065" y="149" fill="#e6edf3">grok</text>
  </g>
  <!-- converge lines -->
  <g stroke="#30363d" stroke-width="2" fill="none">
    <path d="M801 166 C801 200 933 196 933 224"/>
    <path d="M933 166 V224"/>
    <path d="M1065 166 C1065 200 933 196 933 224"/>
  </g>

  <!-- rank node -->
  <rect x="800" y="226" width="266" height="58" rx="12" fill="#1a1f27" stroke="#30363d"/>
  <text x="933" y="255" text-anchor="middle" fill="#e3b341" font-size="19" font-weight="700">★ anonymized ranking</text>
  <text x="933" y="276" text-anchor="middle" class="mono" fill="#8b949e" font-size="14">Response A · B · C — shuffled</text>

  <path d="M933 286 V312" stroke="#6e7681" stroke-width="2"/>
  <path d="M925 303 l8 9 l8 -9" fill="none" stroke="#6e7681" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- chairman -->
  <rect x="800" y="316" width="266" height="56" rx="12" fill="#241a3a" stroke="#8957e5"/>
  <text x="933" y="351" text-anchor="middle" fill="#d2b8ff" font-size="21" font-weight="700">chairman</text>

  <path d="M933 374 V400" stroke="#6e7681" stroke-width="2"/>
  <path d="M925 391 l8 9 l8 -9" fill="none" stroke="#6e7681" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- final answer -->
  <rect x="778" y="404" width="310" height="64" rx="14" fill="#0f2e1b" stroke="#238636"/>
  <text x="933" y="444" text-anchor="middle" fill="#56d364" font-size="24" font-weight="700">✓  final answer</text>

  <!-- ================= footer ================= -->
  <line x1="80" y1="566" x2="1200" y2="566" stroke="#21262d"/>
  <text x="80" y="598" fill="#6e7681" font-size="18" class="mono">github.com/LARIkoz/cli-council</text>
  <text x="1200" y="598" text-anchor="end" fill="#6e7681" font-size="18">no HTTP · stdlib only · loud-fail · MIT</text>
</svg>
